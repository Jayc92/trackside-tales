name: Deploy to GitHub Pages

# Builds the Vite app and publishes dist/ to GitHub Pages.
# Triggers on every push to main, and is also manually re-runnable.

on:
  push:
    branches: [main]
  workflow_dispatch:

# GITHUB_TOKEN permissions needed by the official Pages actions.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one live deployment at a time; cancel queued duplicates but let
# an in-flight deploy finish so a half-deployed site is never left behind.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
